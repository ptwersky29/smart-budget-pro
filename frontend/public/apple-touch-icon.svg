<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <!-- Classic deep hunter green background -->
    <linearGradient id="apple-classic-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4C3A" />
      <stop offset="100%" stop-color="#062E22" />
    </linearGradient>
    <!-- Warm gold accent -->
    <linearGradient id="apple-warm-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Background base: smooth rounded squircle -->
  <rect width="192" height="192" rx="54" fill="url(#apple-classic-green)" />
  
  <!-- Subtle inner border light reflection -->
  <rect x="2" y="2" width="188" height="188" rx="52" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2" />
  
  <!-- Classic elegant thin outer coin border -->
  <circle cx="96" cy="96" r="76" stroke="url(#apple-warm-gold)" stroke-width="2.5" />
  <circle cx="96" cy="96" r="71" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.5" />

  <!-- Laurel wreath branches & leaves scaled to 192x192 -->
  <g transform="translate(16, 16)">
    <!-- Laurel wreath left branch -->
    <path d="M48 116 C38 106 38 80 54 64" stroke="url(#apple-warm-gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Left laurel leaves -->
    <path d="M48 116 C42 113 42 107 48 107 C51 110 51 113 48 116 Z" fill="url(#apple-warm-gold)" />
    <path d="M43 102 C37 99 38 93 44 93 C46 96 46 99 43 102 Z" fill="url(#apple-warm-gold)" />
    <path d="M42 86 C37 82 38 76 44 77 C44 80 44 83 42 86 Z" fill="url(#apple-warm-gold)" />
    <path d="M46 72 C43 68 46 62 52 63 C52 66 50 69 46 72 Z" fill="url(#apple-warm-gold)" />

    <!-- Laurel wreath right branch -->
    <path d="M112 116 C122 106 122 80 106 64" stroke="url(#apple-warm-gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right laurel leaves -->
    <path d="M112 116 C118 113 118 107 112 107 C109 110 109 113 112 116 Z" fill="url(#apple-warm-gold)" />
    <path d="M117 102 C123 99 122 93 116 93 C114 96 114 99 117 102 Z" fill="url(#apple-warm-gold)" />
    <path d="M118 86 C123 82 122 76 116 77 C116 80 116 83 118 86 Z" fill="url(#apple-warm-gold)" />
    <path d="M114 72 C117 68 114 62 108 63 C108 66 110 69 114 72 Z" fill="url(#apple-warm-gold)" />

    <!-- Classic Serif Letter 'P' -->
    <text x="80" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="bold" fill="#FFFFFF" text-anchor="middle">P</text>
    
    <!-- Small star representing premium intelligence -->
    <path d="M80 48 L82.5 53 L87.5 53 L83.5 55.5 L85 60.5 L80 58 L75 60.5 L76.5 55.5 L72.5 53 L77.5 53 Z" fill="url(#apple-warm-gold)" />
  </g>
</svg>
