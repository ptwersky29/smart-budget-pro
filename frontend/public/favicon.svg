<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Classic deep hunter green background -->
    <linearGradient id="fav-classic-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4C3A" />
      <stop offset="100%" stop-color="#062E22" />
    </linearGradient>
    <!-- Warm gold accent -->
    <linearGradient id="fav-warm-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="14" fill="url(#fav-classic-green)" />
  
  <!-- Classic elegant thin outer coin border -->
  <circle cx="16" cy="16" r="12" stroke="url(#fav-warm-gold)" stroke-width="1" />

  <!-- Classic Serif Letter 'P' -->
  <text x="16" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">P</text>
</svg>
