# Render Blueprint — Smart Budget Pro
# Preview environments inherit envVars from master branch

services:
  - type: web
    name: financeai-api
    env: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_DEn4SXe1YkWV@ep-silent-water-ab6f94vy-pooler.eu-west-2.aws.neon.tech/neondb
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://smart-budget-pro-ewtm.vercel.app
      - key: TRUELAYER_REDIRECT_URI
        value: https://budget-pro-4jlg.onrender.com/api/truelayer/callback
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: JSON_LOG
        value: "true"
      - key: LOG_LEVEL
        value: info

  - type: worker
    name: financeai-worker
    env: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "
import asyncio, os, logging
logging.basicConfig(level=getattr(logging, os.environ.get('LOG_LEVEL', 'INFO').upper()))
logger = logging.getLogger('worker')
async def run():
    from server import startup
    await startup()
    logger.info('Worker started — running background tasks')
    while True:
        await asyncio.sleep(3600)
asyncio.run(run())
"
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_DEn4SXe1YkWV@ep-silent-water-ab6f94vy-pooler.eu-west-2.aws.neon.tech/neondb
      - key: JWT_SECRET
        sync: false
      - key: JSON_LOG
        value: "true"
      - key: LOG_LEVEL
        value: info
