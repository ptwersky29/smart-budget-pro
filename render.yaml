services:
  - type: web
    name: financeai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        value: ptwersky29@gmail.com
      - key: ADMIN_PASSWORD
        value: 146Osbaldeston!
      - key: EMERGENT_LLM_KEY
        sync: false
